# ─── Synthetic Loan Generator Configuration ──────────────────────────────────
# Controls the statistical properties of generated CMBS-style loan data.
# All distributions are parameterized per property type for realism.

defaults:
  portfolio_size: 10000
  vintage_range:
    start_year: 2015
    end_year: 2025
  term_years: [5, 7, 10]
  random_seed: 42

# Metro areas included in generation (CBSA-style)
metros:
  - New York
  - Los Angeles
  - Chicago
  - Dallas
  - San Francisco
  - Miami
  - Washington DC
  - Boston
  - Atlanta
  - Seattle
  - Denver
  - Houston
  - Phoenix
  - Philadelphia
  - Minneapolis

# Property-type-specific distribution parameters
property_types:
  Office:
    weight: 0.30  # portfolio allocation
    ltv:
      mean: 0.68
      std: 0.08
      min: 0.40
      max: 0.85
    dscr:
      mean: 1.35
      std: 0.20
      min: 0.80
      max: 2.50
    coupon_spread_bps:
      mean: 200
      std: 40
    occupancy:
      mean: 0.82
      std: 0.12
      min: 0.30
      max: 1.00
    noi_per_sqft:
      mean: 28.0
      std: 8.0

  Retail:
    weight: 0.15
    ltv:
      mean: 0.63
      std: 0.07
      min: 0.35
      max: 0.80
    dscr:
      mean: 1.50
      std: 0.25
      min: 0.90
      max: 3.00
    coupon_spread_bps:
      mean: 220
      std: 45
    occupancy:
      mean: 0.88
      std: 0.10
      min: 0.40
      max: 1.00
    noi_per_sqft:
      mean: 22.0
      std: 6.0

  Industrial:
