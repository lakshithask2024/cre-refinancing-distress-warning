# ─── Stress Testing Scenario Definitions ──────────────────────────────────────
# Each scenario defines shocks to interest rates, cap rates, and/or NOI.
# The stress engine applies these shocks, recomputes derived features, and
# re-scores distress probability using the registered XGBoost classifier.
#
# Shock mechanics:
#   - rate_shock_bps: added to current Treasury 10Y (increases refinance rate)
#   - cap_rate_shock_bps: added to current cap rates (reduces property value)
#   - noi_shock_pct: multiplicative NOI shock (e.g., -0.10 = 10% NOI decline)
#   - property_type_filter: if set, shocks only apply to this property type

scenarios:
  - name: baseline
    description: "Current market conditions — no shock applied (control)"
    rate_shock_bps: 0
    cap_rate_shock_bps: 0
    noi_shock_pct: 0.0
    property_type_filter: null

  - name: rate_shock_100bps
    description: "Moderate rate stress: Treasury 10Y +100 bps"
    rate_shock_bps: 100
    cap_rate_shock_bps: 0
    noi_shock_pct: 0.0
    property_type_filter: null

  - name: rate_shock_200bps
    description: "Elevated rate stress: Treasury 10Y +200 bps"
    rate_shock_bps: 200
    cap_rate_shock_bps: 0
    noi_shock_pct: 0.0
    property_type_filter: null

  - name: rate_shock_300bps
    description: "Severe rate stress: Treasury 10Y +300 bps"
    rate_shock_bps: 300
    cap_rate_shock_bps: 0
    noi_shock_pct: 0.0
    property_type_filter: null

  - name: cap_rate_shock_100bps
    description: "Cap rate expansion: +100 bps all property types (value decline)"
    rate_shock_bps: 0
    cap_rate_shock_bps: 100
    noi_shock_pct: 0.0
    property_type_filter: null

  - name: cap_rate_shock_200bps
    description: "Severe cap rate expansion: +200 bps (significant value decline)"
    rate_shock_bps: 0
    cap_rate_shock_bps: 200
    noi_shock_pct: 0.0
    property_type_filter: null

  - name: combined_severe
    description: "Combined: rate +200 bps AND cap rate +200 bps AND NOI -10%"
    rate_shock_bps: 200
    cap_rate_shock_bps: 200
    noi_shock_pct: -0.10
    property_type_filter: null

  - name: office_specific
    description: "Office downturn: office cap rates +300 bps, office NOI -20%"
    rate_shock_bps: 0
    cap_rate_shock_bps: 300
    noi_shock_pct: -0.20
    property_type_filter: office

# ─── Distress Tier Thresholds ─────────────────────────────────────────────────
tier_thresholds:
  high: 0.70
  medium: 0.40

# ─── Validation ───────────────────────────────────────────────────────────────
validation:
  enforce_monotonicity: true
  tolerance: 0.005
